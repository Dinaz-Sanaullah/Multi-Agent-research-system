# Cloud Build config for ADK agent on Cloud Run
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/research-agent:$BUILD_ID'
      - '-f'
      - 'Dockerfile'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/research-agent:$BUILD_ID'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'research-agent'
      - '--image=gcr.io/$PROJECT_ID/research-agent:$BUILD_ID'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_GENAI_USE_VERTEXAI=True,GOOGLE_CLOUD_LOCATION=us-central1,GEMINI_MODEL=gemini-2.5-flash,EMBEDDING_MODEL=text-embedding-005,SEQUENTIAL_RESEARCH=true,MAX_REVIEW_ITERATIONS=2,GEMINI_RETRY_ATTEMPTS=5,GEMINI_RETRY_INITIAL_DELAY=2.0'
      - '--set-secrets=TAVILY_API_KEY=tavily-api-key:latest'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'

images:
  - 'gcr.io/$PROJECT_ID/research-agent:$BUILD_ID'

options:
  logging: CLOUD_LOGGING_ONLY
